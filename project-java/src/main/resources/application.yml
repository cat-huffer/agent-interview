server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: agent-platform
  profiles:
    active: dev

  # Jackson 全局配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
      timeout: 5000ms

  # 数据库配置
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:agent_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000

  # Spring AI - OpenAI 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          temperature: 0.7
          max-tokens: 4096

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.agent.platform.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Milvus 向量数据库配置
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection-name: ${MILVUS_COLLECTION:agent_documents}
  dimension: 1536
  index-type: IVF_FLAT
  metric-type: COSINE
  nlist: 1024
  nprobe: 16

# Agent 平台配置
agent:
  orchestrator:
    default-mode: REACT
    max-iterations: 10
    timeout-seconds: 120
  memory:
    short-term:
      max-turns: 20
      ttl-minutes: 60
    long-term:
      enabled: true
  rag:
    chunk-size: 512
    chunk-overlap: 64
    top-k: 5
    rerank-top-n: 3
    similarity-threshold: 0.7
  circuit-breaker:
    failure-threshold: 5
    success-threshold: 3
    timeout-seconds: 30

# 日志配置
logging:
  level:
    com.agent.platform: INFO
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

# Actuator 端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
